services:
  db:
    image: postgres:16
    container_name: onlineexam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onlineexam
      POSTGRES_USER: onlineexam
      POSTGRES_PASSWORD: onlineexam
    ports:
      - "5432:5432"
    volumes:
      - onlineexam_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlineexam -d onlineexam"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  onlineexam_db:
